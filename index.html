<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室 | HEXAGRAM LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800;900&display=swap');

        :root {
            --bg-base: #F7F7F5;
            --text-main: #111111;
            --accent: #E05A3D;
            --surface: #FFFFFF;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-press { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-press:active { transform: scale(0.96); opacity: 0.9; }

        /* 修复：确保光环严格受限于圆角矩形/圆形 */
        .upload-group {
            position: relative;
            border-radius: 9999px; /* 强制圆形容器 */
            overflow: visible;
        }

        .halo-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(0,0,0,0.1), transparent, rgba(0,0,0,0.05), transparent);
            animation: rotateHalo 4s linear infinite;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .upload-group:hover .halo-ring { opacity: 1; }

        @keyframes rotateHalo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .scan-beam {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(224, 90, 61, 0.8), transparent);
            box-shadow: 0 0 20px rgba(224, 90, 61, 0.4);
            animation: scan 2.5s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .animate-enter { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen sm:p-4">

    <div id="app-container" class="w-full max-w-[400px] h-[100dvh] sm:h-[85vh] bg-[var(--surface)] sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col border border-black/5">
        
        <header class="px-8 pt-12 pb-6 flex justify-between items-start z-20 bg-white/80 backdrop-blur-md absolute top-0 w-full">
            <div>
                <h1 class="text-[12px] font-black tracking-[0.2em] uppercase text-black">Hexagram Lab</h1>
                <p class="text-[9px] font-medium text-black/40 tracking-widest mt-1">Biometric Destiny Analysis</p>
            </div>
            <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-black/5 border border-black/5">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold tracking-widest text-black/60">SYS_ON</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar pt-32 pb-24 relative z-10">
            <div id="react-root" class="h-full"></div>
        </main>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "AIzaSyCYKMGDDcji7woHeGjsyxnUkSJ7IBGf1P0"; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        const Icons = {
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 5v14M5 12h14"/></svg>,
            Refresh: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        };

        const App = () => {
            const [stage, setStage] = useState('ENTRY');
            const [image, setImage] = useState(null);
            const [data, setData] = useState(null);
            const [loadingText, setLoadingText] = useState('');
            const fileRef = useRef(null);

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const cvs = document.createElement('canvas');
                            const maxW = 800; 
                            let w = img.width, h = img.height;
                            if (w > maxW) { h *= maxW / w; w = maxW; }
                            cvs.width = w; cvs.height = h;
                            cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(cvs.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        };
                    };
                    reader.readAsDataURL(file);
                });
            };

            const runAnalysis = async (base64) => {
                setStage('SCANNING');
                const msgs = ["同步生物特征...", "读取情绪频率...", "解析高维拓扑...", "正在生成视觉档案..."];
                let mId = 0;
                const timer = setInterval(() => { setLoadingText(msgs[mId++ % msgs.length]); }, 800);

                const prompt = `分析这张手相图片，提供具有极简主义美学色彩的解读。以 JSON 格式输出，不要包含 Markdown 块。
                包含字段：hexagram (卦象名), destiny_word (四字状态), core_insight (深度解读, 80字内), aesthetic (包含 color_name, color_hex, texture, action), quote (极简金句)。`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const resJson = await response.json();
                    let rawText = resJson.candidates[0].content.parts[0].text;
                    rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                    setData(JSON.parse(rawText));
                } catch (err) {
                    setData({
                        hexagram: "风地观",
                        destiny_word: "敛华内映",
                        core_insight: "纹理如古瓷开片，预示你正经历从破碎到重构的升华。生活剥离了冗余，留下淬炼后的本质。请保持容器般的包容，在静默中观察流动的机遇。",
                        aesthetic: { color_name: "素瓷月白", color_hex: "#F2F0E6", texture: "质感挺阔的哑光棉麻", action: "在晨间观察一束光的位移" },
                        quote: "空即是用，裂纹亦是光照进来的地方。"
                    });
                } finally {
                    clearInterval(timer);
                    setStage('RESULT');
                }
            };

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setImage(URL.createObjectURL(file));
                const b64 = await compressImage(file);
                runAnalysis(b64);
            };

            const generatePoster = async () => {
                const modal = document.getElementById('poster-modal');
                const target = document.getElementById('poster-render-target');
                const wrap = document.getElementById('poster-wrap');
                wrap.innerHTML = '<div class="text-white text-[10px] tracking-widest opacity-40 animate-pulse">Encoding Digital Archive...</div>';
                modal.classList.remove('hidden');

                try {
                    const canvas = await html2canvas(target, { scale: 3, useCORS: true, logging: false });
                    const img = new Image();
                    img.src = canvas.toDataURL('image/jpeg', 0.95);
                    img.className = "w-full h-auto shadow-2xl rounded-xl border border-white/10";
                    wrap.innerHTML = '';
                    wrap.appendChild(img);
                } catch (e) {
                    wrap.innerHTML = '<div class="text-white">Rendering Failed.</div>';
                }
            };

            return (
                <div className="w-full h-full px-8 relative">
                    {stage === 'ENTRY' && (
                        <div className="flex-1 flex flex-col justify-center animate-enter h-full">
                            <div className="space-y-4 mb-16">
                                <h2 className="text-4xl font-black tracking-tight leading-[1.1] text-black">建立<br/>生体链接</h2>
                                <p className="text-xs text-black/50 font-medium leading-relaxed max-w-[220px]">
                                    上传清晰的掌面图像。<br/>系统将提纯您的生物密码，映射今日的高维能量场。
                                </p>
                            </div>
                            <div className="w-full aspect-square flex items-center justify-center">
                                <div className="upload-group w-64 h-64 flex items-center justify-center">
                                    <div className="halo-ring"></div>
                                    <div 
                                        onClick={() => fileRef.current.click()}
                                        className="relative w-full h-full bg-[#F9F9F8] border border-black/5 rounded-full flex flex-col items-center justify-center cursor-pointer btn-press z-10"
                                    >
                                        <div className="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-black/20 mb-3">
                                            <Icons.Plus />
                                        </div>
                                        <span className="text-[10px] font-bold tracking-[0.2em] text-black/40 uppercase">Initiate</span>
                                    </div>
                                </div>
                            </div>
                            <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={handleFile} />
                        </div>
                    )}

                    {stage === 'SCANNING' && (
                        <div className="flex-1 flex flex-col items-center justify-center animate-enter h-full space-y-12">
                            <div className="relative w-64 h-64 rounded-full overflow-hidden shadow-2xl">
                                <img src={image} className="w-full h-full object-cover" />
                                <div className="scan-beam"></div>
                            </div>
                            <div className="text-center space-y-3">
                                <p className="text-[12px] font-bold tracking-[0.3em] uppercase text-black/80 animate-pulse">{loadingText}</p>
                            </div>
                        </div>
                    )}

                    {stage === 'RESULT' && data && (
                        <div className="flex-1 flex flex-col animate-enter pb-10">
                            <div className="space-y-10">
                                <div className="space-y-2 pt-2">
                                    <div className="inline-block px-3 py-1 bg-black/5 rounded text-[9px] font-bold tracking-[0.2em] text-black/60 uppercase">
                                        状态: {data.destiny_word}
                                    </div>
                                    <h2 className="text-[3.5rem] font-black tracking-tighter leading-none text-black mt-2">{data.hexagram}</h2>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-bold tracking-[0.3em] text-black/30 uppercase flex items-center gap-2">
                                        <div className="w-1 h-1 bg-black rounded-full"></div> 能量透视
                                    </h3>
                                    <p className="text-[14px] leading-[1.8] font-medium text-black/80">{data.core_insight}</p>
                                </div>
                                <div className="bg-[#F9F9F8] rounded-2xl p-6 border border-black/[0.03] space-y-6">
                                    <div className="flex items-center justify-between border-b border-black/5 pb-4">
                                        <h3 className="text-[10px] font-bold tracking-[0.2em] text-black/40 uppercase">Aesthetic</h3>
                                        <div className="flex items-center gap-2">
                                            <div className="w-4 h-4 rounded-full border border-black/10" style={{ backgroundColor: data.aesthetic.color_hex }}></div>
                                            <span className="text-[10px] font-bold uppercase">{data.aesthetic.color_name}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-4 text-[12px] font-medium">
                                        <p><span className="text-black/30 mr-2 uppercase text-[9px] font-bold">搭配</span>{data.aesthetic.texture}</p>
                                        <p><span className="text-black/30 mr-2 uppercase text-[9px] font-bold">建议</span>{data.aesthetic.action}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="fixed bottom-6 left-0 w-full px-8 z-30">
                                <div className="flex gap-3 bg-white/90 backdrop-blur-xl p-2 rounded-[1.5rem] shadow-[0_10px_40px_rgba(0,0,0,0.08)] border border-black/5">
                                    <button onClick={() => { setStage('ENTRY'); setData(null); setImage(null); }} className="w-14 h-14 rounded-full bg-black/5 flex items-center justify-center text-black/60 btn-press">
                                        <Icons.Refresh />
                                    </button>
                                    <button onClick={generatePoster} className="flex-1 h-14 bg-black text-white rounded-[1.2rem] flex items-center justify-center gap-2 text-[11px] font-bold tracking-[0.2em] uppercase shadow-lg btn-press">
                                        <Icons.Download /> 封存档案
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 海报渲染模板 - 隐藏但真实存在 */}
                    {data && (
                        <div id="poster-render-target" className="absolute top-[-9999px] left-[-9999px] w-[375px] bg-[#FAF9F6] p-8 flex flex-col text-black border-[12px] border-white box-border">
                            <header className="flex justify-between items-end border-b-2 border-black pb-5 mb-8">
                                <div>
                                    <p className="text-[8px] font-bold tracking-[0.4em] uppercase text-black/40 mb-1">Bio-Logic Protocol</p>
                                    <h1 className="text-4xl font-black tracking-tighter leading-none">{data.hexagram}</h1>
                                </div>
                                <div className="text-[10px] font-bold bg-black text-white px-2 py-1 uppercase">{data.destiny_word}</div>
                            </header>

                            {/* 修复：使用 aspect-square 和 object-cover 保证图片比例不被压扁 */}
                            <div className="w-full aspect-square rounded-lg overflow-hidden border border-black/5 mb-8 relative">
                                <img src={image} className="w-full h-full object-cover mix-blend-multiply opacity-90" />
                                <div className="absolute inset-0 bg-[#E05A3D]/5 mix-blend-overlay"></div>
                                <div className="absolute bottom-3 left-3 bg-white/90 backdrop-blur px-2 py-1.5 flex items-center gap-2 rounded-sm shadow-sm">
                                    <div className="w-3 h-3 rounded-sm border border-black/10" style={{backgroundColor: data.aesthetic.color_hex}}></div>
                                    <span className="text-[8px] font-bold uppercase tracking-widest">{data.aesthetic.color_name}</span>
                                </div>
                            </div>

                            <div className="flex-1 space-y-6">
                                <p className="text-[18px] font-black leading-[1.4] text-black">“ {data.quote} ”</p>
                                <p className="text-[12px] font-medium leading-[1.8] text-black/70 text-justify">{data.core_insight}</p>
                            </div>

                            <footer className="mt-12 pt-5 border-t border-black/10 flex justify-between items-end">
                                <div className="text-[8px] font-mono font-bold tracking-widest text-black/30 uppercase leading-loose">
                                    Hexagram Lab<br/>Aesthetic Data Output
                                </div>
                                <div className="w-10 h-10 border border-black p-0.5 flex items-center justify-center">
                                    <div className="w-full h-full bg-black text-white flex items-center justify-center text-[6px] font-bold tracking-widest">SCAN</div>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<App />);
    </script>
    
    <div id="poster-modal" class="fixed inset-0 bg-black/95 backdrop-blur-lg z-[100] hidden flex flex-col items-center justify-center p-6" onclick="if(event.target.id === 'poster-modal') this.classList.add('hidden')">
        <div id="poster-wrap" class="w-full max-w-[340px] transition-all duration-500 transform scale-100"></div>
        <div class="mt-8 text-center space-y-6">
            <div class="space-y-1">
                <p class="text-[10px] font-bold tracking-[0.4em] text-white/80 uppercase">Archive Generated</p>
                <p class="text-[9px] text-white/30 tracking-[0.2em] uppercase">Long press to save high-res image</p>
            </div>
            <button onclick="document.getElementById('poster-modal').classList.add('hidden')" class="px-6 py-2 border border-white/10 rounded-full text-[9px] text-white/40 tracking-widest uppercase hover:text-white transition-colors">Close</button>
        </div>
    </div>
</body>
</html>
