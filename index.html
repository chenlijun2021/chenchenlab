<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室 | HEXAGRAM LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800;900&display=swap');

        :root {
            --bg-base: #F7F7F5;
            --text-main: #111111;
            --surface: #FFFFFF;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            overscroll-behavior-y: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-press { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-press:active { transform: scale(0.96); opacity: 0.9; }

        /* 扫描动画 */
        .scan-beam {
            position: absolute;
            left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #000, transparent);
            animation: scan 2s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .animate-enter { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-[100dvh] bg-[#F7F7F5] overflow-hidden">

    <div id="app-container" class="w-full max-w-[420px] h-[100dvh] sm:h-[90vh] bg-white sm:rounded-[2rem] shadow-2xl overflow-hidden relative flex flex-col border border-black/5">
        
        <!-- Header -->
        <header class="px-8 pt-8 pb-4 flex justify-between items-start z-30 bg-white/80 backdrop-blur-md sticky top-0 border-b border-black/5">
            <div>
                <h1 class="text-[11px] font-black tracking-[0.25em] uppercase">Hexagram Lab</h1>
                <p class="text-[9px] font-medium text-black/30 tracking-widest mt-0.5">Context-Aware AI</p>
            </div>
            <div class="px-2 py-0.5 rounded-full border border-black/10 flex items-center gap-1.5">
                <div class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold tracking-tighter text-black/50 uppercase">Sys_On</span>
            </div>
        </header>

        <!-- Dynamic Content -->
        <main id="react-root" class="flex-1 flex flex-col overflow-hidden relative"></main>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = ""; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        const Icons = {
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 5v14M5 12h14"/></svg>,
            Refresh: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        };

        // --- 数字雨/卦象雨 Canvas 组件 ---
        const MatrixRain = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // 设置画布尺寸
                const resize = () => {
                    canvas.width = canvas.parentElement.clientWidth;
                    canvas.height = canvas.parentElement.clientHeight;
                };
                resize();
                window.addEventListener('resize', resize);

                // 字符集：二进制 + 八卦
                const chars = '01乾坤震巽坎离艮兑☰☱☲☳☴☵☶☷'.split('');
                const fontSize = 14;
                const columns = canvas.width / fontSize;
                const drops = Array(Math.floor(columns)).fill(1);

                let animationFrameId;

                const draw = () => {
                    // 半透明遮罩产生拖影效果
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 字体颜色（极简高级灰）
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    ctx.font = fontSize + 'px monospace';

                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                        // 随机重置
                        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                            drops[i] = 0;
                        }
                        drops[i]++;
                    }
                    // 控制帧率，无需太快
                    setTimeout(() => {
                        animationFrameId = requestAnimationFrame(draw);
                    }, 50);
                };

                draw();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none" />;
        };

        const App = () => {
            const [stage, setStage] = useState('ENTRY');
            const [image, setImage] = useState(null);
            const [data, setData] = useState(null);
            const [loadingText, setLoadingText] = useState('');
            const fileRef = useRef(null);

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const cvs = document.createElement('canvas');
                            const max = 1000;
                            let w = img.width, h = img.height;
                            if (w > h && w > max) { h *= max/w; w = max; }
                            else if (h > max) { w *= max/h; h = max; }
                            cvs.width = w; cvs.height = h;
                            cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(cvs.toDataURL('image/jpeg', 0.85).split(',')[1]);
                        };
                    };
                    reader.readAsDataURL(file);
                });
            };

            const runAnalysis = async (base64) => {
                setStage('SCANNING');
                const msgs = ["视网膜数据接收中...", "识别空间与手势语境...", "量子易经引擎启动...", "匹配高维情绪处方..."];
                let idx = 0;
                const timer = setInterval(() => setLoadingText(msgs[idx++ % msgs.length]), 1200);

                // --- 核心：赋予AI活人感、幽默感与多模态识别能力的 Prompt ---
                const prompt = `你是一个拥有顶级审美、深谙《易经》并且极具幽默感的AI视觉大师。
                请先仔细观察这张图片，并根据不同的情况给出不同的反馈策略：
                
                1. 如果图片是【正经平摊的手掌】：请给出极其专业、深度的掌纹易经解析，匹配六十四卦，指出具体纹理（如生命线、智慧线）的特征，文风冷峻、专业。
                2. 如果图片是【特殊手势】（如：比心、剪刀手、点赞等）：请开启“调皮模式”。直接点破用户的手势，并赋予一个幽默的自定义卦名（如“比心卦”、“剪刀手卦”），用轻松、风趣、带点吐槽的口吻来解读他们此刻的心境。
                3. 如果图片【根本不是手】（如猫狗、风景、物品）：请毫不留情地揭穿，但依然基于图片的意象，强行用《易经》的哲理给出一份生活建议。

                无论哪种情况，必须输出合法的 JSON 格式，且严禁包含 markdown 代码块标记：
                {
                    "hexagram": "对应的卦名 (正经卦名 或 幽默自定义卦名)",
                    "destiny_word": "四个字的极简状态词 (如: 敛华内映 或 多巴胺溢)",
                    "core_insight": "深刻或幽默的解读（必须体现出你真实看到了图片里的什么细节，100字左右）",
                    "quote": "一句有意思的金句",
                    "aesthetic": { 
                        "color_name": "推荐审美色名", 
                        "color_hex": "#HEX色值", 
                        "texture": "穿搭或材质建议", 
                        "action": "今日建议动作" 
                    }
                }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const res = await response.json();
                    
                    if (!response.ok) throw new Error(res.error?.message || "API 异常");

                    // 极致强壮的 JSON 提取逻辑
                    let text = res.candidates[0].content.parts[0].text;
                    text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const startIdx = text.indexOf('{');
                    const endIdx = text.lastIndexOf('}');
                    if (startIdx !== -1 && endIdx !== -1) {
                        text = text.substring(startIdx, endIdx + 1);
                    }
                    setData(JSON.parse(text));
                } catch (e) {
                    console.error("解析失败:", e);
                    // 幽默的错误兜底
                    setData({
                        hexagram: "宕机卦",
                        destiny_word: "量子波动",
                        core_insight: "实验室的灵波天线可能被哪只过路的宇宙猫碰歪了。解析出现了一丝时空乱流，但这意味着你此刻的能量超出了算法的边界。保持这种不可预测的神秘感吧。",
                        quote: "连AI都无法定义的你，才是最酷的。",
                        aesthetic: { color_name: "错误代码红", color_hex: "#EF4444", texture: "宽松卫衣", action: "喝杯水，等会儿再试" }
                    });
                } finally {
                    clearInterval(timer);
                    setStage('RESULT');
                }
            };

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setImage(URL.createObjectURL(file));
                const b64 = await compressImage(file);
                runAnalysis(b64);
            };

            const saveArchive = async () => {
                const modal = document.getElementById('save-modal');
                const wrap = document.getElementById('poster-output');
                modal.classList.remove('hidden');
                wrap.innerHTML = '<div class="text-white/40 animate-pulse text-[10px] tracking-widest uppercase py-20 text-center">Rendering High-Res...</div>';

                try {
                    const canvas = await html2canvas(document.getElementById('poster-render-target'), {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: '#FFFFFF'
                    });
                    const img = new Image();
                    img.src = canvas.toDataURL('image/jpeg', 0.95);
                    img.className = "w-full h-auto shadow-2xl border border-white/10 max-h-[80vh] object-contain";
                    wrap.innerHTML = '';
                    wrap.appendChild(img);
                } catch (err) {
                    wrap.innerHTML = '<p class="text-red-400 p-10 text-center">生成失败，请尝试手动截图保存。</p>';
                }
            };

            return (
                <div className="flex-1 flex flex-col h-full overflow-hidden relative z-10">
                    {/* 数字雨背景，仅在 Entry 阶段显示 */}
                    {stage === 'ENTRY' && <MatrixRain />}

                    {stage === 'ENTRY' && (
                        <div className="flex-1 flex flex-col px-10 pt-16 animate-enter relative z-10">
                            <div className="mb-16">
                                <h2 className="text-[2.8rem] font-black leading-[1.1] tracking-tight mb-4">建立<br/>全息链接</h2>
                                <p className="text-[12px] text-black/60 font-medium leading-relaxed max-w-[220px]">
                                    上传手相、手势甚至任何物品。<br/>系统将根据情境动态生成专属解读。
                                </p>
                            </div>
                            <div className="flex-1 flex items-center justify-center pb-20">
                                <div 
                                    onClick={() => fileRef.current.click()}
                                    className="w-56 h-56 rounded-full border border-black/10 bg-white/80 backdrop-blur flex flex-col items-center justify-center cursor-pointer btn-press group shadow-[0_0_40px_rgba(0,0,0,0.05)]"
                                >
                                    <div className="w-12 h-12 rounded-full bg-black shadow-sm flex items-center justify-center mb-4 text-white group-hover:scale-110 transition-transform">
                                        <Icons.Plus />
                                    </div>
                                    <span className="text-[10px] font-bold tracking-[0.3em] uppercase text-black/40 group-hover:text-black transition-colors">Initiate</span>
                                </div>
                            </div>
                            <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={handleFile} />
                        </div>
                    )}

                    {stage === 'SCANNING' && (
                        <div className="flex-1 flex flex-col items-center justify-center space-y-12 animate-enter bg-white/50 backdrop-blur-sm z-10">
                            <div className="w-64 h-64 rounded-full overflow-hidden relative shadow-2xl border-4 border-white">
                                <img src={image} className="w-full h-full object-cover grayscale opacity-60" />
                                <div className="scan-beam"></div>
                            </div>
                            <p className="text-[11px] font-bold tracking-[0.4em] uppercase text-black/80 animate-pulse">{loadingText}</p>
                        </div>
                    )}

                    {stage === 'RESULT' && data && (
                        <div className="flex-1 flex flex-col overflow-hidden animate-enter bg-white z-10">
                            <div className="flex-1 overflow-y-auto no-scrollbar px-8 pt-4 pb-32">
                                <div className="space-y-10">
                                    <div className="space-y-3">
                                        <div className="inline-flex px-2 py-0.5 bg-black text-white text-[9px] font-bold tracking-widest uppercase">
                                            状态: {data.destiny_word}
                                        </div>
                                        <h2 className="text-[2.5rem] leading-none font-black tracking-tighter break-words">{data.hexagram}</h2>
                                    </div>

                                    <div className="space-y-6">
                                        <p className="text-lg font-bold leading-snug italic">“ {data.quote} ”</p>
                                        <p className="text-[14px] leading-[1.8] text-black/80 font-medium text-justify">{data.core_insight}</p>
                                    </div>

                                    <div className="border-t border-black/5 pt-8 space-y-6">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-bold tracking-widest text-black/30 uppercase">Aesthetic Guide</span>
                                            <div className="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-sm border border-black/5">
                                                <div className="w-3 h-3 rounded-sm border border-black/10" style={{backgroundColor: data.aesthetic.color_hex}}></div>
                                                <span className="text-[9px] font-bold uppercase">{data.aesthetic.color_name}</span>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <p className="text-[8px] font-bold text-black/30 uppercase tracking-tighter">Texture</p>
                                                <p className="text-[12px] font-bold leading-relaxed">{data.aesthetic.texture}</p>
                                            </div>
                                            <div className="space-y-1">
                                                <p className="text-[8px] font-bold text-black/30 uppercase tracking-tighter">Action</p>
                                                <p className="text-[12px] font-bold leading-relaxed">{data.aesthetic.action}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="absolute bottom-0 left-0 w-full p-8 pt-10 bg-gradient-to-t from-white via-white to-transparent z-40">
                                <div className="flex gap-3">
                                    <button onClick={() => { setStage('ENTRY'); setData(null); setImage(null); }} className="w-14 h-14 rounded-xl border border-black/10 bg-white flex items-center justify-center text-black/60 btn-press">
                                        <Icons.Refresh />
                                    </button>
                                    <button onClick={saveArchive} className="flex-1 bg-black text-white rounded-xl flex items-center justify-center gap-3 text-[11px] font-bold tracking-[0.2em] uppercase shadow-xl btn-press">
                                        <Icons.Download /> 封存档案
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Poster Render Target (Hidden) */}
                    {data && (
                        <div id="poster-render-target" className="absolute top-[-9999px] left-[-9999px] w-[375px] flex flex-col p-8 pb-12 bg-white box-border text-black">
                            <header className="flex justify-between items-start mb-8">
                                <div>
                                    <p className="text-[8px] font-black tracking-[0.4em] uppercase text-black/30 mb-1">Aesthetic Analytics</p>
                                    <h1 className="text-3xl font-black tracking-tight leading-none break-words max-w-[200px]">{data.hexagram}</h1>
                                </div>
                                <div className="px-2 py-0.5 bg-black text-white text-[9px] font-bold uppercase tracking-widest">{data.destiny_word}</div>
                            </header>

                            <div className="w-full aspect-square bg-black mb-8 overflow-hidden relative rounded-md">
                                <img src={image} className="w-full h-full object-cover mix-blend-screen opacity-90 grayscale" />
                                <div className="absolute inset-0 border-8 border-white/10 mix-blend-overlay"></div>
                                {/* 悬浮的颜色指引 */}
                                <div className="absolute bottom-4 left-4 flex items-center gap-2 px-3 py-1.5 bg-white/95 backdrop-blur rounded shadow-sm border border-black/5">
                                    <div className="w-3 h-3 rounded-sm border border-black/10" style={{backgroundColor: data.aesthetic.color_hex}}></div>
                                    <span className="text-[9px] font-black uppercase tracking-wider">{data.aesthetic.color_name}</span>
                                </div>
                            </div>

                            <div className="flex-1 space-y-6">
                                <p className="text-xl font-bold leading-snug italic">“ {data.quote} ”</p>
                                <p className="text-[12px] leading-[1.8] text-black/80 font-medium text-justify">{data.core_insight}</p>
                            </div>

                            <footer className="mt-12 pt-4 border-t border-black/10 flex justify-between items-end">
                                <div className="text-[7px] font-bold tracking-[0.3em] text-black/20 uppercase leading-relaxed">
                                    Hexagram Lab V5.0<br/>Context-Aware Output
                                </div>
                                <div className="w-10 h-10 border border-black p-0.5 flex items-center justify-center">
                                    <div className="w-full h-full bg-black text-white flex items-center justify-center text-[6px] font-black tracking-widest">SCAN</div>
                                </div>
                            </footer>
                        </div>
                    )}

                    {/* Save Modal */}
                    <div id="save-modal" className="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] hidden flex flex-col items-center justify-center p-6 animate-enter" onClick={(e) => e.target.id === 'save-modal' && e.currentTarget.classList.add('hidden')}>
                        <div id="poster-output" className="w-full flex justify-center items-center"></div>
                        <div className="mt-8 text-center space-y-3">
                            <p className="text-[11px] font-bold text-white tracking-[0.4em] uppercase animate-pulse">Archive Encoded</p>
                            <p className="text-[9px] text-white/40 tracking-widest uppercase">长按图片即可保存至手机相册</p>
                            <button onClick={() => document.getElementById('save-modal').classList.add('hidden')} className="mt-4 px-6 py-2 border border-white/20 rounded-full text-[9px] text-white/50 hover:text-white uppercase tracking-widest transition-colors">关闭</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<App />);
    </script>
</body>
</html>
