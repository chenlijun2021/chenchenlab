<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室</title>
    <!-- 引入核心库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #F5F5F5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #000, transparent);
            animation: scan 2s linear infinite;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-[400px] px-4 py-8"></div>

    <!-- 加载 React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef } = React;

        // 基础配置
        const apiKey = ""; // 运行时环境会自动注入
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [step, setStep] = useState('home'); // home, loading, result
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            // 图像处理
            const processImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const maxSide = 800;
                            let w = img.width, h = img.height;
                            if (w > h) { if (w > maxSide) { h *= maxSide / w; w = maxSide; } }
                            else { if (h > maxSide) { w *= maxSide / h; h = maxSide; } }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        };
                    };
                });
            };

            const analyzePalm = async (base64) => {
                setStep('loading');
                setError(null);
                
                const prompt = `你是一位精通易经与生物识别的大师。请分析这张手掌照片的纹路。
                必须返回严格的 JSON 格式（不要包含任何 Markdown 标记）：
                {
                    "hexagram": "卦名",
                    "insight": "深度解析(100字左右)",
                    "color": "#十六进制颜色",
                    "vibe": "气质建议短语",
                    "outfit": "穿戴指南短语"
                }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API 请求失败");
                    const resData = await response.json();
                    const text = resData.candidates[0].content.parts[0].text;
                    setData(JSON.parse(text));
                    setStep('result');
                } catch (err) {
                    setError("分析出现错误，请重试");
                    setStep('home');
                }
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const base64 = await processImage(file);
                analyzePalm(base64);
            };

            return (
                <div className="bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col min-h-[700px] relative">
                    
                    {/* Header */}
                    <header className="px-8 pt-12 pb-6 text-left">
                        <p className="text-[10px] font-black tracking-[0.3em] text-gray-300 uppercase mb-1">Aesthetic Lab</p>
                        <h1 className="text-2xl font-black tracking-tight text-black">卦象实验室</h1>
                    </header>

                    <main className="flex-1 px-8 flex flex-col">
                        {step === 'home' && (
                            <div className="flex-1 flex flex-col items-center justify-center">
                                <div 
                                    onClick={() => fileInputRef.current.click()}
                                    className="w-full aspect-square border-2 border-dashed border-gray-100 rounded-[3rem] flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition-all active:scale-95"
                                >
                                    <span className="text-4xl text-gray-200 mb-2">＋</span>
                                    <p className="text-[10px] font-bold tracking-widest text-gray-300 uppercase">上传手掌照片</p>
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileChange} accept="image/*" />
                                {error && <p className="mt-4 text-xs text-red-400 font-medium">{error}</p>}
                            </div>
                        )}

                        {step === 'loading' && (
                            <div className="flex-1 flex flex-col items-center justify-center">
                                <div className="w-full aspect-square bg-gray-50 rounded-[3rem] relative overflow-hidden">
                                    <div className="scan-line"></div>
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <p className="text-[10px] font-black tracking-[0.2em] text-gray-400 animate-pulse uppercase">正在解析生物特征...</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'result' && data && (
                            <div className="flex-1 flex flex-col space-y-8 animate-in slide-in-from-bottom-4 duration-700 pb-4">
                                <section className="text-left">
                                    <p className="text-[10px] font-bold text-gray-300 tracking-widest uppercase mb-2">Analysis Result</p>
                                    <h2 className="text-6xl font-black tracking-tighter">{data.hexagram}</h2>
                                    <div className="w-10 h-1.5 bg-black mt-4"></div>
                                </section>

                                <section className="text-left">
                                    <p className="text-sm leading-relaxed text-gray-600 font-medium">
                                        {data.insight}
                                    </p>
                                </section>

                                <section className="bg-gray-50 rounded-[2rem] p-6 space-y-6">
                                    <div className="flex justify-between items-center">
                                        <div className="w-12 h-12 rounded-full shadow-inner" style={{backgroundColor: data.color}}></div>
                                        <span className="text-[10px] font-mono text-gray-400 uppercase font-bold">{data.color}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 border-t border-gray-100 pt-4">
                                        <div className="text-left">
                                            <p className="text-[9px] font-bold text-gray-300 uppercase">气质建议</p>
                                            <p className="text-xs font-black mt-1">{data.vibe}</p>
                                        </div>
                                        <div className="text-left">
                                            <p className="text-[9px] font-bold text-gray-300 uppercase">穿戴指南</p>
                                            <p className="text-xs font-black mt-1">{data.outfit}</p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Footer Button */}
                    <footer className="p-8">
                        {step === 'result' ? (
                            <button 
                                onClick={() => setStep('home')}
                                className="w-full py-5 bg-black text-white rounded-2xl text-[11px] font-black tracking-[0.2em] uppercase active:scale-95 transition-transform shadow-lg shadow-black/10"
                            >
                                重新解析
                            </button>
                        ) : (
                            <div className="h-[58px]"></div> 
                        )}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
