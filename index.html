<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室 | HEXAGRAM LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 核心无衬线字体栈 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800;900&display=swap');

        :root {
            --bg-base: #F7F7F5;
            --text-main: #111111;
            --accent: #E05A3D; /* 朱砂/琥珀红，吉祥且现代 */
            --surface: #FFFFFF;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: none; /* 防止移动端越界回弹 */
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 高级微动效 */
        .btn-press { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-press:active { transform: scale(0.96); opacity: 0.9; }

        /* 上传区呼吸光环 */
        .halo-ring {
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: conic-gradient(from 0deg, transparent, rgba(0,0,0,0.1), transparent);
            animation: rotateHalo 4s linear infinite;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .upload-group:hover .halo-ring { opacity: 1; }

        @keyframes rotateHalo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 琥珀金扫描线 (告别不吉利的黑白) */
        .scan-beam {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255, 180, 50, 0.8), transparent);
            box-shadow: 0 0 20px rgba(255, 180, 50, 0.5);
            animation: scan 2.5s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* 进场动画 */
        .animate-enter { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen sm:p-4">

    <!-- 手机框架限制 -->
    <div id="app-container" class="w-full max-w-[400px] h-[100dvh] sm:h-[85vh] bg-[var(--surface)] sm:rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col border border-black/5">
        
        <!-- Header -->
        <header class="px-8 pt-12 pb-6 flex justify-between items-start z-10 bg-white/80 backdrop-blur-md absolute top-0 w-full">
            <div>
                <h1 class="text-[12px] font-black tracking-[0.2em] uppercase text-black">Hexagram Lab</h1>
                <p class="text-[9px] font-medium text-black/40 tracking-widest mt-1">Biometric Destiny Analysis</p>
            </div>
            <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-black/5 border border-black/5">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold tracking-widest text-black/60">SYS_ON</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto no-scrollbar pt-32 pb-24 relative z-0">
            
            <!-- React Mount Point -->
            <div id="react-root" class="h-full"></div>

        </main>
    </div>

    <!-- React 依赖 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 配置区 ---
        const API_KEY = "AIzaSyCYKMGDDcji7woHeGjsyxnUkSJ7IBGf1P0"; // 请填入您的 Gemini API Key
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        // 现代感图标库 (Lucide)
        const Icons = {
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 5v14M5 12h14"/></svg>,
            Refresh: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        };

        const App = () => {
            const [stage, setStage] = useState('ENTRY'); // ENTRY, SCANNING, RESULT
            const [image, setImage] = useState(null);
            const [data, setData] = useState(null);
            const [loadingText, setLoadingText] = useState('');
            const [showPoster, setShowPoster] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            
            const fileRef = useRef(null);
            const resultRef = useRef(null);

            // --- 压缩图片 (保持移动端稳定) ---
            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const cvs = document.createElement('canvas');
                            const maxW = 600;
                            let w = img.width, h = img.height;
                            if (w > maxW) { h *= maxW / w; w = maxW; }
                            cvs.width = w; cvs.height = h;
                            cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                            resolve(cvs.toDataURL('image/jpeg', 0.7).split(',')[1]);
                        };
                    };
                    reader.readAsDataURL(file);
                });
            };

            // --- API 核心推演 ---
            const runAnalysis = async (base64) => {
                setStage('SCANNING');
                setErrorMsg(null);
                
                // 动态扫描文案
                const msgs = ["构建拓扑模型...", "解构生物特征纹理...", "同频宇宙场能...", "生成命运美学处方..."];
                let mId = 0;
                const timer = setInterval(() => { setLoadingText(msgs[mId++ % msgs.length]); }, 1000);

                const prompt = `你是一位精通东方命理学与现代极简美学的人工智能顾问。
                请分析用户上传的手相图片，并严格按照以下 JSON 格式输出，不要有任何 Markdown 代码块标签（如 \`\`\`json ）。
                注意：
                1. 语气需冷静、专业、具有高级疗愈感（"活人感"）。
                2. 放弃老套的算命话术，采用数字时代的灵性叙事。
                3. 提供高度审美化的色彩和穿搭建议。
                
                {
                    "hexagram": "卦象名(如: 乾为天)",
                    "destiny_word": "四个字的极简状态总结(如: 万物生发)",
                    "core_insight": "掌纹折射出的情绪与运势深度解读（60-80字，感性、现代、疗愈，富有洞察力）",
                    "aesthetic": {
                        "color_name": "具有高级感的开运色名称(如: 琥珀暖沙)",
                        "color_hex": "#HEX色值(必须是真实的16进制)",
                        "texture": "推荐的穿着材质或设计风格(如: 重磅真丝、利落剪裁)",
                        "action": "今日宜做的一件极简小事(如: 独处10分钟、整理桌面)"
                    },
                    "quote": "一句充满哲理与美学的极简金句，适合印在海报上"
                }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const resJson = await response.json();
                    if (!response.ok) throw new Error("API 调用异常");

                    // 深度清洗 JSON，防止 AI 依然携带特殊字符
                    let rawText = resJson.candidates[0].content.parts[0].text;
                    rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    setData(JSON.parse(rawText));
                    clearInterval(timer);
                    setStage('RESULT');
                } catch (err) {
                    console.error(err);
                    clearInterval(timer);
                    // 优雅的兜底数据，绝不让用户白屏
                    setData({
                        hexagram: "地风升",
                        destiny_word: "向上生长",
                        core_insight: "纹理结构清晰且具备向外的扩张势能。当下的磁场正指引你摆脱内耗。不必急于求成，植物的生长是静默的，但力量惊人。允许一切自然发生。",
                        aesthetic: {
                            "color_name": "冷翠杉青",
                            "color_hex": "#2E473B",
                            "texture": "硬挺的纯棉或原色亚麻，建立物理边界感",
                            "action": "进行一次无目的的漫步"
                        },
                        quote: "在静默中，完成能量的置换。"
                    });
                    setStage('RESULT');
                }
            };

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setImage(URL.createObjectURL(file));
                const b64 = await compressImage(file);
                // 这里即使没有API_KEY也走fallback以供测试，或者您可以开启判断
                runAnalysis(b64);
            };

            const generatePoster = async () => {
                const modal = document.getElementById('poster-modal');
                const target = document.getElementById('poster-render-target');
                const wrap = document.getElementById('poster-wrap');
                
                wrap.innerHTML = '<div class="p-20 text-[10px] tracking-widest uppercase opacity-40 animate-pulse text-white">Archiving Data...</div>';
                modal.classList.remove('hidden');

                try {
                    const canvas = await html2canvas(target, {
                        scale: 3, // 高清渲染
                        backgroundColor: "#FFFFFF",
                        useCORS: true
                    });
                    const img = new Image();
                    img.src = canvas.toDataURL('image/jpeg', 0.9);
                    img.className = "w-full h-auto shadow-2xl rounded-xl border border-black/5";
                    wrap.innerHTML = '';
                    wrap.appendChild(img);
                } catch (e) {
                    wrap.innerHTML = '<div class="p-10 text-xs text-red-500">渲染失败，请截图保存。</div>';
                }
            };

            // 使用 Fragment 包装返回的内容，确保只有一个根节点，修正JSX解析错误
            return (
                <>
                    <div className="w-full h-full flex flex-col relative px-8">
                        
                        {/* --- VIEW: ENTRY --- */}
                        {stage === 'ENTRY' && (
                            <div className="flex-1 flex flex-col justify-center animate-enter">
                                <div className="space-y-4 mb-16">
                                    <h2 className="text-4xl font-black tracking-tight leading-[1.1] text-black">
                                        建立<br/>生体链接
                                    </h2>
                                    <p className="text-xs text-black/50 font-medium leading-relaxed max-w-[220px]">
                                        上传清晰的掌面图像。<br/>系统将提纯您的生物密码，映射今日的高维能量场。
                                    </p>
                                </div>

                                {/* 高级上传交互区 */}
                                <div className="w-full aspect-square relative group upload-group">
                                    <div className="halo-ring"></div>
                                    <div 
                                        onClick={() => fileRef.current.click()}
                                        className="absolute inset-2 bg-[#F9F9F8] border border-black/10 rounded-full flex flex-col items-center justify-center cursor-pointer btn-press hover:bg-black/[0.02]"
                                    >
                                        <div className="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-black/40 mb-3 group-hover:scale-110 transition-transform duration-500 group-hover:text-black">
                                            <Icons.Plus />
                                        </div>
                                        <span className="text-[10px] font-bold tracking-[0.2em] text-black/40 uppercase">Initiate</span>
                                    </div>
                                </div>
                                
                                {errorMsg && <div className="mt-8 text-[10px] text-red-500 font-bold bg-red-50 py-2 px-4 rounded text-center">{errorMsg}</div>}
                                <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={handleFile} />
                            </div>
                        )}

                        {/* --- VIEW: SCANNING --- */}
                        {stage === 'SCANNING' && (
                            <div className="flex-1 flex flex-col items-center justify-center animate-enter space-y-12">
                                <div className="relative w-64 h-64 rounded-full overflow-hidden shadow-2xl ring-1 ring-black/5">
                                    {/* 移除灰阶，改用吉瑞的温暖滤镜 */}
                                    <img src={image} className="w-full h-full object-cover mix-blend-multiply opacity-90" />
                                    <div className="absolute inset-0 bg-[#E05A3D]/10 mix-blend-overlay"></div>
                                    <div className="scan-beam"></div>
                                </div>
                                <div className="text-center space-y-3">
                                    <p className="text-[12px] font-bold tracking-[0.3em] uppercase text-black/80 animate-pulse">{loadingText}</p>
                                    <p className="text-[9px] font-mono text-black/30 uppercase tracking-widest">Processing Bio-Signals</p>
                                </div>
                            </div>
                        )}

                        {/* --- VIEW: RESULT --- */}
                        {stage === 'RESULT' && data && (
                            <div className="flex-1 flex flex-col animate-enter pb-10">
                                
                                {/* 结果页内容 */}
                                <div className="space-y-12">
                                    
                                    {/* 卦名与总结 */}
                                    <div className="space-y-2 pt-2">
                                        <div className="inline-block px-3 py-1 bg-black/5 rounded text-[9px] font-bold tracking-[0.2em] text-black/60 uppercase">
                                            状态: {data.destiny_word}
                                        </div>
                                        <h2 className="text-[3.5rem] font-black tracking-tighter leading-none text-black mt-2">
                                            {data.hexagram}
                                        </h2>
                                    </div>

                                    {/* 深度解析 */}
                                    <div className="space-y-4">
                                        <h3 className="text-[10px] font-bold tracking-[0.3em] text-black/30 uppercase flex items-center gap-2">
                                            <div className="w-1 h-1 bg-black rounded-full"></div> 能量透视
                                        </h3>
                                        <p className="text-[14px] leading-[1.8] font-medium text-black/80 text-justify">
                                            {data.core_insight}
                                        </p>
                                    </div>

                                    {/* 美学指南卡片 */}
                                    <div className="bg-[#F9F9F8] rounded-2xl p-6 border border-black/[0.03] space-y-6">
                                        <div className="flex items-center justify-between border-b border-black/5 pb-4">
                                            <h3 className="text-[10px] font-bold tracking-[0.2em] text-black/40 uppercase">Aesthetic Guide</h3>
                                            <div className="flex items-center gap-2">
                                                <div className="w-4 h-4 rounded-full border border-black/10" style={{ backgroundColor: data.aesthetic.color_hex }}></div>
                                                <span className="text-[10px] font-bold uppercase">{data.aesthetic.color_name}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-5">
                                            <div>
                                                <span className="block text-[9px] font-bold tracking-[0.2em] text-black/30 uppercase mb-1">材质与剪裁</span>
                                                <p className="text-[12px] font-medium leading-relaxed">{data.aesthetic.texture}</p>
                                            </div>
                                            <div>
                                                <span className="block text-[9px] font-bold tracking-[0.2em] text-black/30 uppercase mb-1">情绪动线</span>
                                                <p className="text-[12px] font-medium leading-relaxed">{data.aesthetic.action}</p>
                                            </div>
                                        </div>
                                    </div>

                                </div>

                                {/* 悬浮操作栏 */}
                                <div className="fixed bottom-6 left-0 w-full px-8 z-20">
                                    <div className="flex gap-3 bg-white/90 backdrop-blur-xl p-2 rounded-[1.5rem] shadow-[0_10px_40px_rgba(0,0,0,0.08)] border border-black/5">
                                        <button 
                                            onClick={() => { setStage('ENTRY'); setData(null); setImage(null); }}
                                            className="w-14 h-14 rounded-full bg-black/5 flex items-center justify-center text-black/60 btn-press"
                                        >
                                            <Icons.Refresh />
                                        </button>
                                        <button 
                                            onClick={generatePoster}
                                            className="flex-1 h-14 bg-black text-white rounded-[1.2rem] flex items-center justify-center gap-2 text-[11px] font-bold tracking-[0.2em] uppercase shadow-lg btn-press"
                                        >
                                            <Icons.Download /> 封存档案
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="h-24"></div> {/* 底部留白 */}
                            </div>
                        )}
                    </div>

                    {/* --- 隐藏的海报渲染目标 --- */}
                    {data && (
                        <div id="poster-render-target" className="absolute top-[-9999px] left-[-9999px] w-[375px] bg-[#FAF9F6] p-8 flex flex-col text-black border-[12px] border-white box-border">
                            <header className="flex justify-between items-end border-b-2 border-black pb-4 mb-8">
                                <div>
                                    <p className="text-[8px] font-bold tracking-[0.4em] uppercase text-black/40 mb-1">Bio-Logic Protocol</p>
                                    <h1 className="text-3xl font-black tracking-tighter leading-none">{data.hexagram}</h1>
                                </div>
                                <div className="text-[10px] font-bold bg-black text-white px-2 py-1 uppercase">{data.destiny_word}</div>
                            </header>

                            <div className="w-full aspect-[4/3] rounded-lg overflow-hidden border border-black/5 mb-8 relative">
                                <img src={image} className="w-full h-full object-cover mix-blend-multiply opacity-90" />
                                <div className="absolute inset-0 bg-[#E05A3D]/5 mix-blend-overlay"></div>
                                {/* 色彩标定角标 */}
                                <div className="absolute bottom-3 left-3 bg-white/90 backdrop-blur px-2 py-1 flex items-center gap-2 rounded-sm shadow-sm">
                                    <div className="w-3 h-3 rounded-sm border border-black/10" style={{backgroundColor: data.aesthetic.color_hex}}></div>
                                    <span className="text-[8px] font-bold uppercase">{data.aesthetic.color_name}</span>
                                </div>
                            </div>

                            <div className="flex-1 space-y-6">
                                <p className="text-[16px] font-black leading-[1.6] text-black">
                                    “ {data.quote} ”
                                </p>
                                <p className="text-[11px] font-medium leading-[1.8] text-black/70 text-justify">
                                    {data.core_insight}
                                </p>
                            </div>

                            <footer className="mt-10 pt-4 border-t border-black/10 flex justify-between items-end">
                                <div className="text-[8px] font-mono font-bold tracking-widest text-black/30 uppercase leading-loose">
                                    Hexagram Lab<br/>Aesthetic Data Output
                                </div>
                                <div className="w-10 h-10 border border-black p-0.5 flex items-center justify-center">
                                    <div className="w-full h-full bg-black text-white flex items-center justify-center text-[6px] font-bold tracking-widest">SCAN</div>
                                </div>
                            </footer>
                        </div>
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<App />);
    </script>
    
    {/* --- 海报预览弹窗 (移至 React 外部确保不受遮挡影响) --- */}
    <div id="poster-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-6" onclick="if(event.target.id === 'poster-modal') this.classList.add('hidden')">
        <div id="poster-wrap" class="w-full max-w-[340px]"></div>
        <div class="mt-8 text-center space-y-4">
            <p class="text-[11px] font-bold tracking-[0.3em] text-white/80 uppercase animate-pulse">
                长按图片保存
            </p>
            <button onclick="document.getElementById('poster-modal').classList.add('hidden')" class="text-[10px] text-white/40 tracking-widest uppercase hover:text-white">关闭 / CLOSE</button>
        </div>
    </div>
</body>
</html>
