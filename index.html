<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室</title>
    <!-- 核心库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #F2F2F2; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 扫描动画 */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, #000, transparent);
            animation: scan 2s linear infinite;
            z-index: 10;
        }

        #report-card {
            background: white;
            transition: transform 0.3s ease;
        }
        
        /* 针对移动端优化点击效果 */
        .btn-active:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-[400px] px-4 py-8"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const apiKey = ""; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [step, setStep] = useState('home'); 
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const [saveImage, setSaveImage] = useState(null);
            const fileInputRef = useRef(null);
            const reportRef = useRef(null);

            // 当进入结果页且数据加载完后生成图片
            useEffect(() => {
                if (step === 'result' && data) {
                    const timer = setTimeout(() => generateSaveableImage(), 1200);
                    return () => clearTimeout(timer);
                }
            }, [step, data]);

            const generateSaveableImage = async () => {
                if (!reportRef.current || typeof html2canvas === 'undefined') return;
                try {
                    const canvas = await html2canvas(reportRef.current, {
                        useCORS: true,
                        scale: 2,
                        backgroundColor: "#ffffff",
                        borderRadius: 32,
                        logging: false
                    });
                    setSaveImage(canvas.toDataURL('image/png'));
                } catch (err) {
                    console.error("Image generation failed", err);
                }
            };

            const analyzePalm = async (base64) => {
                setStep('loading');
                setError(null);
                setSaveImage(null);
                
                const prompt = `你是一位精通易经与生物识别的大师。请分析手掌照片。
                必须返回严格JSON：{"hexagram": "卦名", "insight": "解析", "color": "#HEX", "vibe": "气质", "outfit": "建议"}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("连接能量场失败");
                    const resData = await response.json();
                    const text = resData.candidates[0].content.parts[0].text;
                    setData(JSON.parse(text));
                    setStep('result');
                } catch (err) {
                    setError("解析中断，请重试");
                    setStep('home');
                }
            };

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 800; canvas.height = (img.height/img.width)*800;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        analyzePalm(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    };
                };
            };

            return (
                <div className="w-full flex flex-col items-center">
                    <div className="w-full bg-white rounded-[2.5rem] shadow-[0_30px_60px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col min-h-[680px]">
                        
                        {/* 报告内容区域（可被截图） */}
                        <div ref={reportRef} id="report-card" className="flex-1 flex flex-col relative bg-white">
                            <header className="px-8 pt-12 pb-6">
                                <p className="text-[10px] font-black tracking-[0.4em] text-gray-300 uppercase mb-1">Ethereal Science</p>
                                <h1 className="text-2xl font-black tracking-tight text-black">卦象实验室</h1>
                            </header>

                            <main className="flex-1 px-8 flex flex-col">
                                {step === 'home' && (
                                    <div className="flex-1 flex flex-col items-center justify-center py-10">
                                        <div 
                                            onClick={() => fileInputRef.current.click()}
                                            className="w-full aspect-[4/5] border-2 border-dashed border-gray-100 rounded-[3rem] flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition-all btn-active"
                                        >
                                            <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                                                <span className="text-2xl text-gray-300">＋</span>
                                            </div>
                                            <p className="text-[10px] font-bold tracking-widest text-gray-400 uppercase text-center">
                                                上传手掌照片<br/><span className="text-[8px] opacity-60">开启易经生物特征解析</span>
                                            </p>
                                        </div>
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFile} accept="image/*" />
                                        {error && <p className="mt-6 text-[10px] text-red-400 font-bold">{error}</p>}
                                    </div>
                                )}

                                {step === 'loading' && (
                                    <div className="flex-1 flex flex-col items-center justify-center">
                                        <div className="w-full aspect-square bg-gray-50 rounded-[3rem] relative overflow-hidden flex items-center justify-center">
                                            <div className="scan-line"></div>
                                            <p className="text-[10px] font-black tracking-[0.2em] text-gray-400 animate-pulse uppercase text-center">
                                                正在同步周易场<br/>计算生物特征...
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {step === 'result' && data && (
                                    <div className="flex-1 flex flex-col space-y-8 animate-in fade-in duration-1000">
                                        <section>
                                            <h2 className="text-7xl font-black tracking-tighter text-black">{data.hexagram}</h2>
                                            <div className="w-10 h-1.5 bg-black mt-4"></div>
                                        </section>

                                        <section>
                                            <p className="text-sm leading-relaxed text-gray-600 font-medium text-justify">
                                                {data.insight}
                                            </p>
                                        </section>

                                        <section className="bg-gray-50 rounded-[2rem] p-6 space-y-6">
                                            <div className="flex justify-between items-center">
                                                <div className="w-12 h-12 rounded-full border-4 border-white shadow-sm" style={{backgroundColor: data.color}}></div>
                                                <span className="text-[10px] font-mono text-gray-400 font-bold">{data.color}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 border-t border-gray-100 pt-4">
                                                <div>
                                                    <p className="text-[9px] font-bold text-gray-300 uppercase tracking-widest mb-1">气质关键词</p>
                                                    <p className="text-xs font-black">{data.vibe}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[9px] font-bold text-gray-300 uppercase tracking-widest mb-1">穿搭建议</p>
                                                    <p className="text-xs font-black">{data.outfit}</p>
                                                </div>
                                            </div>
                                        </section>
                                        <div className="py-4 text-center">
                                            <p className="text-[8px] font-black text-gray-200 tracking-[0.4em] uppercase">- 长按此区域保存报告 -</p>
                                        </div>
                                    </div>
                                )}
                            </main>

                            {/* 透明图片覆盖层：只覆盖 report-card 内部，不干扰 footer */}
                            {step === 'result' && saveImage && (
                                <img 
                                    src={saveImage} 
                                    className="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer"
                                    style={{ WebkitTouchCallout: 'default' }}
                                />
                            )}
                        </div>

                        {/* 操作区域：独立于截图区域之外，确保按钮可点击 */}
                        <footer className="px-8 pb-8 pt-2 bg-white z-20">
                            {step === 'result' && (
                                <button 
                                    onClick={() => {
                                        setStep('home');
                                        setData(null);
                                        setSaveImage(null);
                                    }}
                                    className="w-full py-5 bg-black text-white rounded-2xl text-[11px] font-black tracking-[0.2em] uppercase btn-active shadow-lg shadow-black/10"
                                >
                                    重新解析
                                </button>
                            )}
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
