<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 用于生成长按保存的图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F5F5F5; overflow: hidden; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        @keyframes scanY { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan-y { animation: scanY 2.5s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 隐藏滚动条 */
        .custom-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full">
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ 请在此处填入你的 API Key
        // ==========================================
        const apiKey = ""; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [step, setStep] = useState('entry');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            
            // 海报状态
            const [showPoster, setShowPoster] = useState(false);
            const [generatingPoster, setGeneratingPoster] = useState(false);
            const [posterImg, setPosterImg] = useState(null);
            
            const fileInputRef = useRef(null);

            // 清理 JSON 字符串，修复截图里的“空白”bug
            const cleanJsonResponse = (text) => {
                let cleaned = text.trim();
                cleaned = cleaned.replace(/^```[a-z]*\n/i, "").replace(/\n```$/i, "");
                return cleaned;
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; 
                            const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        };
                    };
                });
            };

            const callWithRetry = async (base64Data, retries = 5, delay = 1000) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`;
                
                // 强化了易经推演的 Prompt
                const prompt = `你是一位精通《易经》的数字算力大师。请仔细观察这张手掌照片中的掌纹走向（如生命线、智慧线、感情线）及掌丘特征。将提取到的生物特征与易经的阴阳、五行、八卦理论进行深度融合与蒸馏，推演其对应的易经卦象。
                必须严格以 JSON 格式返回，绝对不要包含任何 Markdown 代码块标记（如 \`\`\`json）：
                {
                    "hexagram": "卦名(如：乾、坤、泰，仅填文字，不要加'卦'字)",
                    "core_insight": "结合具体掌纹特征与易经卦理的深度解析(80-120字，明确点出掌纹是如何映射到该卦象的)",
                    "poster_quote": "一句极具哲理的美学金句(结合卦象)",
                    "aesthetic_guide": {
                        "color_hex": "符合该卦象的十六进制颜色代码",
                        "color_name": "颜色的中文意境名",
                        "vibe": "气质建议",
                        "outfit_detail": "穿戴指南"
                    }
                }`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                        ]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                };

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            const res = await response.json();
                            const text = res.candidates?.[0]?.content?.parts?.[0]?.text;
                            return JSON.parse(cleanJsonResponse(text));
                        }

                        if (response.status === 404) {
                            const err = await response.json();
                            throw new Error(err.error?.message || "Model not found");
                        }

                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
                    }
                }
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                setErrorMsg('');
                setPosterImg(null);
                
                try {
                    const base64 = await compressImage(file);
                    const result = await callWithRetry(base64);
                    setData(result);
                    setStep('report');
                } catch (err) {
                    console.error(err);
                    setErrorMsg(`分析失败: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            };

            // 生成长按保存的海报逻辑
            const handleGeneratePoster = () => {
                setShowPoster(true);
                setGeneratingPoster(true);
                
                setTimeout(async () => {
                    try {
                        const element = document.getElementById('poster-template');
                        if (element) {
                            const canvas = await html2canvas(element, { 
                                scale: 2, 
                                backgroundColor: '#ffffff',
                                useCORS: true 
                            });
                            setPosterImg(canvas.toDataURL('image/png'));
                        }
                    } catch (err) {
                        console.error("海报生成失败", err);
                    } finally {
                        setGeneratingPoster(false);
                    }
                }, 500);
            };

            return (
                <div className="fixed inset-0 bg-[#F5F5F5] flex items-center justify-center p-4">
                    <div className="w-full max-w-[400px] h-[750px] bg-white rounded-[2.5rem] shadow-2xl relative flex flex-col overflow-hidden border border-black/5">
                        
                        {errorMsg && (
                            <div className="absolute top-10 left-6 right-6 bg-red-50 text-red-600 text-xs p-4 rounded-2xl z-[100] animate-fade-in border border-red-100 flex justify-between items-center">
                                <span className="flex-1 pr-2">{errorMsg}</span>
                                <button onClick={() => setErrorMsg('')} className="font-bold uppercase tracking-widest text-[10px]">关闭</button>
                            </div>
                        )}

                        <header className="pt-12 px-8 pb-4">
                            <h2 className="text-[10px] font-black tracking-[0.3em] uppercase opacity-30 mb-1">Aesthetic Lab</h2>
                            {/* 更新了名称，保留了原本 UI 设计 */}
                            <h1 className="text-2xl font-black tracking-tighter">卦象实验室</h1>
                        </header>

                        <main className="flex-1 p-8 flex flex-col">
                            {step === 'entry' && (
                                <div className="flex-1 flex flex-col justify-center animate-fade-in">
                                    <div 
                                        onClick={() => !loading && fileInputRef.current.click()} 
                                        className={`w-full aspect-square border-2 border-dashed border-black/10 rounded-[3rem] flex flex-col items-center justify-center relative transition-all ${loading ? 'bg-gray-50' : 'hover:bg-gray-50 cursor-pointer active:scale-95'}`}
                                    >
                                        {loading ? (
                                            <div className="text-center space-y-4">
                                                <div className="w-8 h-8 border-4 border-black border-t-transparent rounded-full animate-spin mx-auto"></div>
                                                <p className="text-[10px] font-bold tracking-widest uppercase animate-pulse">正在提取卦象...</p>
                                                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-black/5 to-transparent h-1 w-full animate-scan-y"></div>
                                            </div>
                                        ) : (
                                            <div className="text-center opacity-20">
                                                <div className="text-4xl mb-4">＋</div>
                                                <div className="text-[10px] font-black tracking-[0.2em] uppercase">上传手掌照片</div>
                                            </div>
                                        )}
                                    </div>
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleUpload} accept="image/*" />
                                </div>
                            )}

                            {step === 'report' && data && (
                                <div className="animate-fade-in space-y-8 overflow-y-auto pr-2 custom-scrollbar pb-10">
                                    <div>
                                        <div className="text-[9px] font-bold opacity-30 tracking-[0.2em] uppercase mb-2">Analysis Result</div>
                                        <h3 className="text-5xl font-black">{data.hexagram}卦</h3>
                                    </div>
                                    <div className="space-y-2">
                                        <div className="w-8 h-1 bg-black"></div>
                                        {/* 这里的核心解析会被正常注入，不会再空白 */}
                                        <p className="text-sm leading-relaxed text-gray-600 font-medium">{data.core_insight}</p>
                                    </div>
                                    <div className="p-6 rounded-[2rem] bg-gray-50 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <div className="w-10 h-10 rounded-full shadow-inner" style={{backgroundColor: data.aesthetic_guide?.color_hex || '#000'}}></div>
                                            <span className="text-[10px] font-mono font-bold opacity-40 uppercase">{data.aesthetic_guide?.color_hex}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-2 border-t border-black/5">
                                            <div>
                                                <span className="text-[9px] font-bold opacity-30 uppercase">气质建议</span>
                                                <p className="text-xs font-bold mt-1">{data.aesthetic_guide?.vibe}</p>
                                            </div>
                                            <div>
                                                <span className="text-[9px] font-bold opacity-30 uppercase">穿戴指南</span>
                                                <p className="text-xs font-bold mt-1">{data.aesthetic_guide?.outfit_detail}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* 更新的底部按钮栏：重新解析 & 生成海报 */}
                        {step === 'report' && (
                            <footer className="p-8 pt-0 space-y-3 z-10 bg-white">
                                <button onClick={handleGeneratePoster} className="w-full h-14 bg-black text-white rounded-2xl text-[11px] font-black tracking-[0.2em] uppercase active:scale-95 transition-transform shadow-lg">生成分享海报</button>
                                <button onClick={() => setStep('entry')} className="w-full h-14 bg-gray-100 text-gray-600 rounded-2xl text-[11px] font-black tracking-[0.2em] uppercase active:scale-95 transition-transform">重新解析</button>
                            </footer>
                        )}

                        {/* 隐藏的海报 DOM 模板 (用于截图) */}
                        {data && (
                            <div id="poster-template" className="w-[340px] bg-white p-8 flex flex-col relative font-sans text-black" style={{ position: 'fixed', top: '-9999px', left: '-9999px' }}>
                                <div className="border border-black/10 rounded-3xl p-6 flex flex-col relative overflow-hidden bg-white shadow-sm">
                                    <h2 className="text-[10px] font-black tracking-[0.3em] uppercase opacity-30 mb-1">Aesthetic Lab</h2>
                                    <h1 className="text-2xl font-black tracking-tighter mb-8">卦象实验室</h1>
                                    
                                    <div className="text-[50px] font-black tracking-tighter leading-none mb-4">{data.hexagram}卦</div>
                                    <p className="text-[13px] font-bold italic mb-6">“{data.poster_quote}”</p>
                                    
                                    <div className="w-8 h-1 bg-black mb-4"></div>
                                    <p className="text-[11px] leading-relaxed text-gray-600 mb-6 font-medium">{data.core_insight}</p>
                                    
                                    <div className="flex items-center gap-3 pt-5 border-t border-gray-100">
                                        <div className="w-8 h-8 rounded-full shadow-inner" style={{backgroundColor: data.aesthetic_guide.color_hex}}></div>
                                        <div>
                                            <p className="text-[9px] font-bold opacity-40 uppercase">专属能量色</p>
                                            <p className="text-[11px] font-bold uppercase">{data.aesthetic_guide.color_name} {data.aesthetic_guide.color_hex}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 海报展示弹窗 */}
                        {showPoster && (
                            <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 animate-fade-in">
                                {generatingPoster ? (
                                    <div className="text-white flex flex-col items-center gap-4">
                                        <div className="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                                        <p className="text-xs font-bold tracking-widest uppercase animate-pulse">正在精绘海报...</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center w-full max-w-[320px] animate-fade-in">
                                        {posterImg && <img src={posterImg} alt="卦象海报" className="w-full rounded-[2rem] shadow-2xl mb-8 border-4 border-white" />}
                                        <p className="text-white/80 text-[11px] font-bold tracking-[0.2em] uppercase animate-pulse mb-8">
                                            👆 长按上方图片保存到手机相册
                                        </p>
                                        <button 
                                            onClick={() => setShowPoster(false)} 
                                            className="w-12 h-12 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-white/30 transition-all backdrop-blur-md"
                                        >
                                            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
