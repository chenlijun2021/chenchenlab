<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室</title>
    <!-- 引入核心库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #F5F5F5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, #000, transparent);
            animation: scan 2s linear infinite;
            z-index: 10;
        }

        .btn-active:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-[400px] px-4 py-8"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const apiKey = "AIzaSyCYKMGDDcji7woHeGjsyxnUkSJ7IBGf1P0"; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [step, setStep] = useState('home'); 
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const [saveImage, setSaveImage] = useState(null);
            const fileInputRef = useRef(null);
            const reportRef = useRef(null);

            useEffect(() => {
                if (step === 'result' && data) {
                    const timer = setTimeout(() => generateSaveableImage(), 1000);
                    return () => clearTimeout(timer);
                }
            }, [step, data]);

            const generateSaveableImage = async () => {
                if (!reportRef.current || typeof html2canvas === 'undefined') return;
                try {
                    const canvas = await html2canvas(reportRef.current, {
                        useCORS: true,
                        scale: 2,
                        backgroundColor: "#ffffff",
                        borderRadius: 32,
                        logging: false
                    });
                    setSaveImage(canvas.toDataURL('image/png'));
                } catch (err) {
                    console.error("Save image error", err);
                }
            };

            const resizeAndCompress = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 512; // 手机端极致压缩，确保请求必过
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // 使用较小的质量参数
                            resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
                        };
                        img.onerror = () => reject("图片加载失败");
                    };
                    reader.onerror = () => reject("读取文件失败");
                });
            };

            const analyzePalm = async (base64) => {
                setStep('loading');
                setError(null);
                setSaveImage(null);
                
                const prompt = `你是一位精通周易与美学的实验室AI。请通过此手掌图像，分析其卦象、气质和建议。
                返回严格JSON：{"hexagram":"卦名","insight":"解析","color":"#HEX颜色","vibe":"气质短语","outfit":"建议"}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) {
                        const errInfo = await response.json().catch(() => ({}));
                        throw new Error(`API Error: ${response.status} - ${errInfo.error?.message || '未知错误'}`);
                    }
                    
                    const resData = await response.json();
                    const rawText = resData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("API 未返回解析内容");
                    
                    setData(JSON.parse(rawText));
                    setStep('result');
                } catch (err) {
                    console.error(err);
                    setError(err.message.includes("429") ? "请求太频繁，请稍后再试" : "解析中断，请重试或更换图片");
                    setStep('home');
                }
            };

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const base64 = await resizeAndCompress(file);
                    analyzePalm(base64);
                } catch (err) {
                    setError("图片处理失败，请重试");
                }
            };

            return (
                <div className="w-full flex flex-col items-center">
                    <div className="w-full bg-white rounded-[3rem] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col min-h-[720px]">
                        
                        {/* 结果区域 */}
                        <div ref={reportRef} className="flex-1 flex flex-col relative bg-white">
                            <header className="px-10 pt-14 pb-8">
                                <p className="text-[10px] font-black tracking-[0.5em] text-gray-300 uppercase mb-2">Aesthetic Lab</p>
                                <h1 className="text-3xl font-black tracking-tighter text-black">卦象实验室</h1>
                            </header>

                            <main className="flex-1 px-10 flex flex-col">
                                {step === 'home' && (
                                    <div className="flex-1 flex flex-col items-center justify-center py-10">
                                        <div 
                                            onClick={() => fileInputRef.current.click()}
                                            className="w-full aspect-[4/5] border-2 border-dashed border-gray-100 rounded-[3rem] flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition-all btn-active"
                                        >
                                            <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6">
                                                <span className="text-3xl text-gray-300">＋</span>
                                            </div>
                                            <p className="text-[11px] font-bold tracking-widest text-gray-400 uppercase text-center leading-relaxed">
                                                上传手掌照片<br/>开启深度命理分析
                                            </p>
                                        </div>
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFile} accept="image/*" />
                                        {error && <div className="mt-8 p-4 bg-red-50 rounded-2xl w-full text-center">
                                            <p className="text-[10px] text-red-400 font-bold leading-relaxed">{error}</p>
                                        </div>}
                                    </div>
                                )}

                                {step === 'loading' && (
                                    <div className="flex-1 flex flex-col items-center justify-center">
                                        <div className="w-full aspect-square bg-gray-50 rounded-[4rem] relative overflow-hidden flex items-center justify-center">
                                            <div className="scan-line"></div>
                                            <p className="text-[11px] font-black tracking-[0.3em] text-gray-400 animate-pulse uppercase text-center leading-loose">
                                                数据同步中<br/>解析掌部脉络...
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {step === 'result' && data && (
                                    <div className="flex-1 flex flex-col space-y-10 animate-in fade-in duration-700">
                                        <section>
                                            <h2 className="text-8xl font-black tracking-tighter text-black leading-none">{data.hexagram}</h2>
                                            <div className="w-16 h-2 bg-black mt-6"></div>
                                        </section>

                                        <section>
                                            <p className="text-sm leading-relaxed text-gray-600 font-medium text-justify">
                                                {data.insight}
                                            </p>
                                        </section>

                                        <section className="bg-gray-50 rounded-[2.5rem] p-8 space-y-8">
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-full border-4 border-white shadow-sm" style={{backgroundColor: data.color}}></div>
                                                    <span className="text-[10px] font-bold text-gray-300 uppercase tracking-widest">能量主色</span>
                                                </div>
                                                <span className="text-[11px] font-mono text-gray-400 font-bold">{data.color}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-6 border-t border-gray-100 pt-6">
                                                <div>
                                                    <p className="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-2">核心气质</p>
                                                    <p className="text-[13px] font-black">{data.vibe}</p>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-2">穿搭开运</p>
                                                    <p className="text-[13px] font-black">{data.outfit}</p>
                                                </div>
                                            </div>
                                        </section>
                                        <div className="py-4 text-center">
                                            <p className="text-[9px] font-black text-gray-200 tracking-[0.4em] uppercase">- 长按此区域保存分析报告 -</p>
                                        </div>
                                    </div>
                                )}
                            </main>

                            {/* 结果页透明覆盖层（仅限长按保存使用） */}
                            {step === 'result' && saveImage && (
                                <img src={saveImage} className="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer" style={{ WebkitTouchCallout: 'default' }} />
                            )}
                        </div>

                        {/* 操作区：永远置顶，不被遮挡 */}
                        <footer className="px-10 pb-12 pt-2 bg-white z-20">
                            {step === 'result' && (
                                <button 
                                    onClick={() => { setStep('home'); setData(null); setSaveImage(null); }}
                                    className="w-full py-6 bg-black text-white rounded-3xl text-[12px] font-black tracking-[0.3em] uppercase btn-active shadow-2xl shadow-black/20"
                                >
                                    重新解析
                                </button>
                            )}
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
